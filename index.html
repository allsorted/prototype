<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AllSorted" />
  <meta name="application-name" content="AllSorted" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="description" content="Plan meals. Shop once. Eat well." />

  <!-- PWA: installable on Android (manifest) and iOS (apple-* tags) -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <title>AllSorted</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100dvh;background:#0D0D0D;overflow:hidden}
    #root{height:100%;display:flex;flex-direction:column}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="data/recipes.js"></script>
  <script src="app.js"></script>
  <script>
    // Register service worker so the app shell is cached and the
    // browser offers "Install app" / "Add to Home Screen" on Android & iOS.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
