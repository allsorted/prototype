<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AllSorted" />
  <meta name="application-name" content="AllSorted" />
  <meta name="theme-color" content="#0D0D0D" />
  <meta name="description" content="Plan meals. Shop once. Eat well." />

  <!-- PWA: installable on Android (manifest) and iOS (apple-* tags) -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="48x48" href="favicon-48.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <title>AllSorted</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100dvh;background:#0D0D0D;overflow:hidden}
    #root{height:100%;display:flex;flex-direction:column}

    /* On phones the app already fills the screen — no frame needed.
       On wider viewports (desktop/tablet browsers), present it inside
       a centered phone-shaped frame instead of stretching edge to edge.
       No fake notch here on purpose — the app already shows its own
       "All$orted" wordmark in its persistent header, and a cosmetic
       notch would sit right on top of it and partially hide it. */
    @media (min-width: 560px) {
      body{
        display:flex;
        align-items:center;
        justify-content:center;
        background:radial-gradient(circle at 50% 32%, #1c1c1c 0%, #050505 75%);
        overflow:auto;
      }
      #root{
        width:360px;
        height:min(100dvh - 48px, 880px);
        max-height:calc(100dvh - 48px);
        border-radius:42px;
        overflow:hidden;
        position:relative;
        box-shadow:
          0 0 0 8px #1a1a1a,
          0 0 0 10px #2e2e2e,
          0 30px 90px rgba(0,0,0,0.65);
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="data/recipes.js"></script>
  <script src="app.js"></script>
  <script>
    // Register service worker so the app shell is cached and the
    // browser offers "Install app" / "Add to Home Screen" on Android & iOS.
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
